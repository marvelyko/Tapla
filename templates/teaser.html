<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tapla | Coming Soon</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body class="teaser-page">
    <div class="teaser-wrapper">
      <!-- Background: blurred image -->
      <div
        class="teaser-bg"
        style="background-image: url('{{ url_for('static', filename='images/background-kitchen.png') }}?v=2');"
      ></div>
      <div class="teaser-bg-overlay"></div>

      <!-- Language toggle (top right) -->
      <div class="teaser-lang-row">
        <button type="button" data-lang-toggle="ka" class="lang-btn active">
          KA
        </button>
        <span class="teaser-lang-sep" aria-hidden="true">|</span>
        <button type="button" data-lang-toggle="en" class="lang-btn">
          EN
        </button>
      </div>

      <!-- Content -->
      <div class="teaser-content">
        <div class="teaser-logo-container">
          <img
            src="{{ url_for('static', filename='images/logo.svg') }}"
            alt="Tapla - Natural Georgian Treats"
            class="teaser-logo"
            onerror="this.onerror=null; var w=this.closest('.teaser-logo-container'); if(w){ var d=document.createElement('div'); d.className='teaser-logo-fallback'; d.setAttribute('data-i18n','teaser.logoMissing'); d.textContent='Logo image missing'; w.innerHTML=''; w.appendChild(d); if(typeof setLanguage==='function') setLanguage(document.documentElement.lang||'en'); }"
          />
        </div>

        <div class="teaser-glass-card">
          <p class="teaser-badge">
            <span data-i18n="teaser.badge"></span>
          </p>
          <h1 class="teaser-headline">
            <span data-i18n="teaser.headline"
              ></span
            >
          </h1>
          <p class="teaser-subtitle">
            <span data-i18n="teaser.subtitle"
              ></span
            >
          </p>

          <form id="teaser-form" class="teaser-form">
            <label
              for="teaserEmail"
              class="teaser-sr-only"
              data-i18n="teaser.notifyLabel"
              ></label
            >
            <div class="teaser-form-row">
              <input
                id="teaser-email"
                type="email"
                class="teaser-input"
                placeholder="you@example.com"
                data-i18n-placeholder="teaser.notifyPlaceholder"
              />
              <button type="submit" class="teaser-btn-submit">
                <span data-i18n="teaser.notifyCta"></span>
              </button>
            </div>
            <p
              id="teaserNotifyFeedback"
              class="teaser-feedback teaser-feedback-hidden"
              data-i18n="teaser.notifyFeedback"
            >
            </p>
          </form>

          <div class="teaser-social-block">
            <p class="teaser-social-title" data-i18n="teaser.socialsTitle">
            </p>
            <div class="teaser-social-btns">
              <a
                href="https://www.instagram.com/tapla.ge/"
                class="teaser-social-btn"
                aria-label="Open Tapla Instagram"
                target="_blank"
                rel="noopener noreferrer"
              >IG</a>
              <a
                href="https://www.facebook.com/tapla.gee"
                class="teaser-social-btn"
                aria-label="Open Tapla Facebook"
                target="_blank"
                rel="noopener noreferrer"
              >FB</a>
              <a
                href="https://www.tiktok.com/@tapla.ge"
                class="teaser-social-btn"
                aria-label="Open Tapla TikTok"
                target="_blank"
                rel="noopener noreferrer"
              >TK</a>
              <a
                href="https://www.youtube.com/@tapla_ge"
                class="teaser-social-btn"
                aria-label="Open Tapla YouTube"
                target="_blank"
                rel="noopener noreferrer"
              >YT</a>
            </div>
          </div>
        </div>

        <p class="teaser-footer-line">
          <span data-i18n="teaser.footerLine"
            ></span
          >
        </p>
      </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
